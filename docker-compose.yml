version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sql_assistant_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: sql_assistant_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sql_assistant
      - SECRET_KEY=SUPER_SECRET_SECURITY_KEY_FOR_JWT_SIGNING_1234567890
      - AI_PROVIDER=openrouter
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.5-flash}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: sql_assistant_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
